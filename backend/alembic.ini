# Alembic 配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 模板文件（注释掉表示使用默认）
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 是否使用双引号包裹标识符
quote_schema = false

# SQLAlchemy URL（使用同步驱动，Alembic 迁移需要同步连接）
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/ai_dev_hub

# 目标数据库元数据
# 用于 autogenerate 生成迁移脚本时对比模型变更

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
