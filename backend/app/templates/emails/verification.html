<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证您的邮箱地址</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            padding: 40px 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .content {
            background: #ffffff;
            padding: 40px 30px;
            text-align: center;
        }
        .greeting {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .instruction {
            color: #4b5563;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .verify-button {
            display: inline-block;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .verify-button:hover {
            opacity: 0.9;
        }
        .alternative {
            background: #f9fafb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .alternative p {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #6b7280;
        }
        .link-text {
            word-break: break-all;
            background: #e5e7eb;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #4b5563;
        }
        .notice {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            padding: 25px 20px;
            color: #9ca3af;
            font-size: 12px;
            background: #f9fafb;
            border-radius: 0 0 8px 8px;
        }
        .footer a {
            color: #6b7280;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>验证您的邮箱地址</h1>
        </div>
        <div class="content">
            <p class="greeting">您好，{{ username }}！</p>
            
            <p class="instruction">
                请点击下方按钮验证您的邮箱地址，完成账户激活。
            </p>
            
            <a href="{{ verification_url }}" class="verify-button">验证邮箱</a>
            
            <div class="alternative">
                <p>如果按钮无法点击，请复制以下链接到浏览器中打开：</p>
                <div class="link-text">{{ verification_url }}</div>
            </div>
            
            <p class="notice">
                此链接将在 24 小时后失效。如果您没有注册 AI 开发者机会聚合平台账户，请忽略此邮件。
            </p>
        </div>
        <div class="footer">
            <p>© 2025 AI开发者机会聚合平台. All rights reserved.</p>
            <p>本邮件由系统自动发送，请勿直接回复</p>
        </div>
    </div>
</body>
</html>
