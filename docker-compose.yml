version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: ai-dev-hub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_dev_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存/消息队列
  redis:
    image: redis:7-alpine
    container_name: ai-dev-hub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI 后端服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-dev-hub-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_dev_hub
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_dev_hub
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-dev-hub-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped

  # 爬虫服务（按需手动运行）
  spider:
    build:
      context: ./spiders
      dockerfile: Dockerfile
    container_name: ai-dev-hub-spider
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_dev_hub
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_dev_hub
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - spider
    restart: "no"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ai-dev-hub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
